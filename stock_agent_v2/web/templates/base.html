<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0e1117" />
  <title>{% block title %}Vanguard{% endblock %}</title>
  <link rel="stylesheet" href="{{ static('css/style.css') }}" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/reports">📈 Vanguard</a>
    <nav class="navlinks">
      <a href="/reports">분석</a>
      <a href="/signals">시그널</a>
      <a href="/warnings">경고</a>
      <a href="/filings">공시</a>
    </nav>
    <form action="/logout" method="post" class="logout">
      <span class="who">{{ (user.display_name if user else request.state.username) or "" }}</span>
      <button type="submit">로그아웃</button>
    </form>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
